<!DOCTYPE html>
<!-- Firebase Hosting デプロイ対象の正本（ルートの tenpokanri.jsx 等は参照用）。ロジック: js/app.js / スタイル: css/app.css -->
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗引き継ぎ・確認アプリ | 店舗チェック</title>
    <meta name="description" content="店舗の引き継ぎ確認・温度・HACCP・トイレ掃除など各種チェックを記録する現場向けアプリです。">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-gray-100 p-4 sm:p-6">

    <!-- ローディングオーバーレイ -->
    <div id="loading-overlay" class="fixed inset-0 bg-white bg-opacity-75 z-50 flex flex-col justify-center items-center">
        <div class="loader"></div>
        <p id="loading-text" class="mt-4 text-gray-600">接続中...</p>
    </div>

    <!-- アプリ本体 -->
    <div id="app-container" class="max-w-7xl mx-auto hidden">
        
        <!-- トップページ（店舗・担当者・カテゴリ選択） -->
        <div id="main-app-view">
            <div class="w-full max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 sm:p-8 space-y-6">
                <div class="text-center">
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">店舗引き継ぎ・確認</h1>
                    <p class="text-gray-500 mt-1">店舗・担当を選び、引き継ぎや各種チェックを記録します</p>
                </div>
                <!-- ステップ1: 店舗と担当者を選択 -->
                <div id="step-1" class="step-card space-y-4">
                    <div>
                        <label for="store-select" class="block text-sm font-medium text-gray-700">店舗</label>
                        <select id="store-select" required class="mt-1 block w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg p-2.5">
                            <option value="" selected disabled>店舗を選択してください</option>
                        </select>
                    </div>
                    <div>
                        <label for="staff-select" class="block text-sm font-medium text-gray-700">担当者</label>
                        <select id="staff-select" required class="mt-1 block w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg p-2.5">
                            <option value="" selected disabled>担当者を選択してください</option>
                        </select>
                    </div>
                    <button id="to-step-2" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition-colors" disabled>大項目選択へ <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
                <!-- ステップ2: チェックカテゴリを選択 -->
                <div id="step-2" class="step-card hidden-step space-y-3">
                    <div class="text-sm text-gray-600 p-3 bg-gray-100 rounded-lg">
                        <p><i class="fas fa-store mr-2 text-gray-500"></i><span id="selected-store" class="font-medium"></span></p>
                        <p><i class="fas fa-user mr-2 text-gray-500"></i><span id="selected-staff" class="font-medium"></span></p>
                    </div>
                     <!-- ダッシュボードへのボタン -->
                    <button id="show-dashboard-btn" class="w-full text-left bg-teal-500 hover:bg-teal-600 text-white border py-4 px-5 rounded-lg flex justify-between items-center transition-colors">
                        <div><span class="font-semibold"><i class="fas fa-chart-line mr-3"></i>本日の状況ダッシュボード</span></div><i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="border-t my-4"></div>
                    <button data-category="温度チェック" class="category-btn w-full text-left bg-white hover:bg-gray-50 border py-4 px-5 rounded-lg flex justify-between items-center transition-colors">
                        <div><span class="font-semibold"><i class="fas fa-thermometer-half mr-3 text-red-500"></i>温度チェック</span><div class="text-xs text-gray-500 mt-1 category-status"></div></div><i class="fas fa-chevron-right text-gray-400"></i>
                    </button>
                    <button data-category="HACCPチェック" class="category-btn w-full text-left bg-white hover:bg-gray-50 border py-4 px-5 rounded-lg flex justify-between items-center transition-colors">
                        <div><span class="font-semibold"><i class="fas fa-clipboard-check mr-3 text-green-500"></i>HACCPチェック</span><div class="text-xs text-gray-500 mt-1 category-status"></div></div><i class="fas fa-chevron-right text-gray-400"></i>
                    </button>
                    <button data-category="トイレ掃除" class="category-btn w-full text-left bg-white hover:bg-gray-50 border py-4 px-5 rounded-lg flex justify-between items-center transition-colors">
                        <div><span class="font-semibold"><i class="fas fa-restroom mr-3 text-blue-500"></i>トイレ掃除</span><div class="text-xs text-gray-500 mt-1 category-status"></div></div><i class="fas fa-chevron-right text-gray-400"></i>
                    </button>
                    <button data-category="引き継ぎチェック" class="category-btn w-full text-left bg-white hover:bg-gray-50 border py-4 px-5 rounded-lg flex justify-between items-center transition-colors">
                        <div><span class="font-semibold"><i class="fas fa-people-arrows mr-3 text-purple-500"></i>引き継ぎチェック</span><div class="text-xs text-gray-500 mt-1 category-status"></div></div><i class="fas fa-chevron-right text-gray-400"></i>
                    </button>
                    <button id="back-to-step-1" class="w-full mt-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg transition-colors"><i class="fas fa-arrow-left mr-2"></i>戻る</button>
                </div>
            </div>
        </div>

        <!-- チェックリスト詳細画面 -->
        <div id="checklist-view" class="hidden-view">
             <!-- ここに各チェックリストのHTMLが動的に生成される -->
        </div>

        <!-- ダッシュボード画面 -->
        <div id="dashboard-view" class="hidden-view">
            <!-- ここにダッシュボードのHTMLが動的に生成される -->
        </div>

        <footer class="mt-8 pt-4 border-t border-gray-200 text-center text-xs text-gray-500">
            <button type="button" id="version-info-btn" class="text-blue-600 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-300 rounded px-1">アプリ情報を読み込み中…</button>
        </footer>
    </div>

    <div id="version-modal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black bg-opacity-40 p-4" aria-modal="true" role="dialog">
        <div class="bg-white rounded-xl shadow-xl max-w-lg w-full max-h-[85vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center border-b px-4 py-3 shrink-0">
                <h2 class="text-lg font-bold text-gray-800">リリース・デプロイ履歴</h2>
                <button type="button" id="version-modal-close" class="text-gray-500 hover:text-gray-800 text-2xl leading-none px-1" aria-label="閉じる">&times;</button>
            </div>
            <div class="px-4 py-3 overflow-y-auto text-sm text-gray-700" id="version-modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
